syntax = "proto3";

package tripsphere.attraction.v1;

import "tripsphere/common/v1/map.proto";

option go_package = "tripsphere/attraction/v1";
option java_multiple_files = true;
option java_package = "org.tripsphere.attraction.v1";

service AttractionService {
  rpc AddAttraction(AddAttractionRequest) returns (AddAttractionResponse);

  rpc FindAttractionById(FindAttractionByIdRequest) returns (FindAttractionByIdResponse);

  rpc DeleteAttraction(DeleteAttractionRequest) returns (DeleteAttractionResponse);

  // Find attractions within a radius from a location and list them in order from near to far
  rpc FindAttractionsLocationNear(FindAttractionsLocationNearRequest) returns (FindAttractionsLocationNearResponse);
}

message Attraction {
  string id = 1;
  string name = 2;
  tripsphere.common.v1.Address address = 3;
  string introduction = 4;
  repeated string tags = 5;
  repeated string images = 6;
  tripsphere.common.v1.GeoPoint location = 7;
}

message AddAttractionRequest {
  Attraction attraction = 1;
}

message AddAttractionResponse {
  string id = 1; //attraction id
}

message DeleteAttractionRequest {
  string id = 1;
}

message DeleteAttractionResponse {}

message ChangeAttractionRequest {
  Attraction attraction = 1;
}

message ChangeAttractionResponse {
  bool success = 1;
}

message FindAttractionByIdRequest {
  string id = 1;
}

message FindAttractionByIdResponse {
  Attraction attraction = 1;
}

message FindAttractionsLocationNearRequest {
  tripsphere.common.v1.GeoPoint location = 1;
  double radius_km = 2;
  repeated string tags = 3;
}

message FindAttractionsLocationNearResponse {
  repeated Attraction attractions = 1;
}

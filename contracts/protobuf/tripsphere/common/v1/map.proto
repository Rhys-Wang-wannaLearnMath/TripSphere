syntax = "proto3";

package tripsphere.common.v1;

option go_package = "tripsphere/common/v1";
option java_multiple_files = true;
option java_package = "org.tripsphere.common.v1";

enum CoordinateSystem {
  COORDINATE_SYSTEM_UNSPECIFIED = 0;
  COORDINATE_SYSTEM_WGS84 = 1;
  COORDINATE_SYSTEM_GCJ02 = 2;
  COORDINATE_SYSTEM_BD09 = 3;
}

message GeoPoint {
  double longitude = 1;
  double latitude = 2;
}

// China address
message Address {
  string province = 1; // e.g., "上海市"
  string city = 2; // e.g., "上海市"
  string district = 3; // e.g., "杨浦区"
  string detailed = 4; // e.g., "新江湾城街道淞沪路2100号smpskatepark滑板公园"
}

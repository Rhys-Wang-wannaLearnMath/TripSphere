syntax = "proto3";

package tripsphere.itinerary.v1;

import "google/protobuf/struct.proto";
import "tripsphere/attraction/v1/attraction.proto";
import "tripsphere/common/v1/date.proto";
import "tripsphere/common/v1/money.proto";
import "tripsphere/common/v1/timeofday.proto";
import "tripsphere/hotel/v1/hotel.proto";
import "tripsphere/poi/v1/poi.proto";

option go_package = "tripsphere/itinerary/v1";
option java_multiple_files = true;
option java_package = "org.tripsphere.itinerary.v1";

service ItineraryService {
  rpc CreateItinerary(CreateItineraryRequest) returns (CreateItineraryResponse);

  rpc GetItinerary(GetItineraryRequest) returns (GetItineraryResponse);

  rpc ArchiveItinerary(ArchiveItineraryRequest) returns (ArchiveItineraryResponse);

  rpc ListUserItineraries(ListUserItinerariesRequest) returns (ListUserItinerariesResponse);

  rpc AddDayPlan(AddDayPlanRequest) returns (AddDayPlanResponse);

  rpc DeleteDayPlan(DeleteDayPlanRequest) returns (DeleteDayPlanResponse);

  rpc AddActivity(AddActivityRequest) returns (AddActivityResponse);

  rpc UpdateActivity(UpdateActivityRequest) returns (UpdateActivityResponse);

  rpc DeleteActivity(DeleteActivityRequest) returns (DeleteActivityResponse);
}

enum ActivityKind {
  ACTIVITY_KIND_UNSPECIFIED = 0;
  ACTIVITY_KIND_ATTRACTION_VISIT = 1;
  ACTIVITY_KIND_DINING = 2;
  ACTIVITY_KIND_HOTEL_STAY = 3;
  ACTIVITY_KIND_CUSTOM = 4;
}

message Activity {
  string id = 1;
  ActivityKind kind = 2;
  string title = 3;
  string description = 4;
  tripsphere.common.v1.TimeOfDay start_time = 5;
  tripsphere.common.v1.TimeOfDay end_time = 6;
  tripsphere.common.v1.Money estimated_cost = 7;
  oneof resource {
    tripsphere.attraction.v1.Attraction attraction = 8;
    tripsphere.hotel.v1.Hotel hotel = 9;
  }
  google.protobuf.Struct metadata = 10;
}

message DayPlan {
  string id = 1;
  tripsphere.common.v1.Date date = 2;
  string title = 3;
  repeated Activity activities = 4;
  string notes = 5;
  google.protobuf.Struct metadata = 6;
}

message Itinerary {
  string id = 1;
  string title = 2;
  string user_id = 3;
  tripsphere.poi.v1.Poi destination = 4;
  tripsphere.common.v1.Date start_date = 5;
  tripsphere.common.v1.Date end_date = 6;
  repeated DayPlan day_plans = 7;
  google.protobuf.Struct metadata = 8;
}

message CreateItineraryRequest {
  Itinerary itinerary = 1;
}

message CreateItineraryResponse {
  Itinerary itinerary = 1;
}

message GetItineraryRequest {
  string id = 1;
}

message GetItineraryResponse {
  Itinerary itinerary = 1;
}

message ArchiveItineraryRequest {
  string id = 1;
}

message ArchiveItineraryResponse {}

message ListUserItinerariesRequest {
  string user_id = 1;
  int32 page_size = 2;
  // A page token, received from a previous `ListUserItineraries` call.
  // Provide this to retrieve the subsequent page.
  string page_token = 3;
}

message ListUserItinerariesResponse {
  repeated Itinerary itineraries = 1;
  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

message AddDayPlanRequest {
  string itinerary_id = 1;
  DayPlan day_plan = 2;
}

message AddDayPlanResponse {
  DayPlan day_plan = 1;
}

message UpdateDayPlanRequest {
  string itinerary_id = 1;
  DayPlan day_plan = 2;
}

message UpdateDayPlanResponse {
  DayPlan day_plan = 1;
}

message DeleteDayPlanRequest {
  string itinerary_id = 1;
  string day_plan_id = 2;
}

message DeleteDayPlanResponse {}

message AddActivityRequest {
  string itinerary_id = 1;
  string day_plan_id = 2;
  Activity activity = 3;
  // The index of the activity to be inserted before.
  // If not set or out of range, the activity will be added to the end of the day plan.
  int32 insert_index = 4;
}

message AddActivityResponse {
  Activity activity = 1;
}

message UpdateActivityRequest {
  string itinerary_id = 1;
  string day_plan_id = 2;
  Activity activity = 3;
}

message UpdateActivityResponse {
  Activity activity = 1;
}

message DeleteActivityRequest {
  string itinerary_id = 1;
  string day_plan_id = 2;
  string activity_id = 3;
}

message DeleteActivityResponse {}

syntax = "proto3";

package tripsphere.poi.v1;

import "google/protobuf/field_mask.proto";
import "tripsphere/common/v1/map.proto";

option go_package = "tripsphere/poi/v1";
option java_multiple_files = true;
option java_package = "org.tripsphere.poi.v1";

service PoiService {
  rpc GetPoiById(GetPoiByIdRequest) returns (GetPoiByIdResponse);

  rpc BatchGetPois(BatchGetPoisRequest) returns (BatchGetPoisResponse);

  rpc GetPoiByAmapId(GetPoiByAmapIdRequest) returns (GetPoiByAmapIdResponse);

  rpc SearchPoisNearby(SearchPoisNearbyRequest) returns (SearchPoisNearbyResponse);

  rpc SearchPoisInBounds(SearchPoisInBoundsRequest) returns (SearchPoisInBoundsResponse);

  rpc CreatePoi(CreatePoiRequest) returns (CreatePoiResponse);

  rpc BatchCreatePois(BatchCreatePoisRequest) returns (BatchCreatePoisResponse);

  rpc UpdatePoi(UpdatePoiRequest) returns (UpdatePoiResponse);

  rpc DeletePoi(DeletePoiRequest) returns (DeletePoiResponse);
}

message Poi {
  string id = 1;
  string name = 2;
  // GCJ02 coordinate system location
  tripsphere.common.v1.GeoPoint location = 3;
  tripsphere.common.v1.Address address = 4;
  // China Area Division Code
  string adcode = 5;
  // Amap POI ID. This is optional.
  // If present, indicates the POI is sourced from Amap.
  string amap_id = 6;
  repeated string categories = 7;
  repeated string images = 8;
}

message GetPoiByIdRequest {
  string id = 1;
}

message GetPoiByIdResponse {
  Poi poi = 1;
}

message BatchGetPoisRequest {
  // POI IDs.
  repeated string ids = 1;
  // Field mask to specify which fields to return.
  google.protobuf.FieldMask field_mask = 2;
}

message BatchGetPoisResponse {
  // POI ID -> POI.
  // If a POI is not found, it will not be included in the map.
  map<string, Poi> pois = 1;
}

message GetPoiByAmapIdRequest {
  string amap_id = 1;
}

message GetPoiByAmapIdResponse {
  Poi poi = 1;
}

message PoiFilter {
  repeated string categories = 1;
  string adcode = 2;
}

message SearchPoisNearbyRequest {
  tripsphere.common.v1.GeoPoint location = 1;
  double radius_meters = 2;
  int32 limit = 3;
  PoiFilter filter = 4;
}

message SearchPoisNearbyResponse {
  repeated Poi pois = 1;
  // The total number of POIs that match the filter.
  int32 total_count = 2;
}

message SearchPoisInBoundsRequest {
  tripsphere.common.v1.GeoPoint south_west = 1;
  tripsphere.common.v1.GeoPoint north_east = 2;
  int32 limit = 3;
  PoiFilter filter = 4;
}

message SearchPoisInBoundsResponse {
  repeated Poi pois = 1;
  // The total number of POIs that match the filter.
  int32 total_count = 2;
}

message CreatePoiRequest {
  Poi poi = 1;
}

message CreatePoiResponse {
  Poi poi = 1;
}

message BatchCreatePoisRequest {
  repeated Poi pois = 1;
}

message BatchCreatePoisResponse {
  int32 total_count = 1;
  int32 success_count = 2;
  int32 failure_count = 3;
  repeated CreatePoiResult results = 4;
}

message CreatePoiResult {
  enum Code {
    CODE_UNSPECIFIED = 0;
    CODE_SUCCESS = 1;
  }

  // The index of the POI in the request.
  int32 index = 1;
  // The code of the result.
  Code code = 2;
  // The error message of the result.
  string message = 3;
  // The ID of the POI if the creation was successful.
  string poi_id = 4;
}

message UpdatePoiRequest {
  Poi poi = 1;
  google.protobuf.FieldMask field_mask = 2;
}

message UpdatePoiResponse {
  Poi poi = 1;
}

message DeletePoiRequest {
  string id = 1;
}

message DeletePoiResponse {}
